name: Java CI with Maven & Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # A button in UI to manually trigger

# When a workflow runs, `GITHUB_TOKEN` is created 
# By default, token has read & write access
# Each job inherits the top-level permissions
permissions:
  contents: read # cannot change code

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Read `GITHUB_REPOSITORY` to know which repo to clone
      # Use token to authenticate (don't need to provide password)
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Not re-download dependencies if pom.xml hasn't changed

      - name: Run Unit Tests
        # Run in non-interactive mode (logs are less verbose)
        run: ./mvnw -B test

  build-and-push:
    needs: test # Runs only if 'test' passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU # Allow x86 runner to "emulate" an ARM chip
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  
          push: true # build *AND* push
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/petclinic:latest
            ${{ secrets.DOCKER_USERNAME }}/petclinic:${{ github.run_number }}
          cache-from: type=gha # Download unchanged layers
          cache-to: type=gha,mode=max # Save new layers after building
          # `mode=min`: Only cache the final image layers
          # `mode=max`: Cache intermediate layers as well (save the compilation stage)
